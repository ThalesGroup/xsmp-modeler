name: Build
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: CI
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.19.0'
    - name: Generate Langium sources
      shell: bash
      run: |
        npm ci
        npm run langium:generate:production
        git diff --exit-code
    - name: Lint
      shell: bash
      run: |
        npm run lint
    - name: Build
      shell: bash
      run: |
        npm run build
    - name: Test
      if: success() || failure()
      shell: bash
      run: |
        npm run coverage
    - name: Package VS Code extension
      shell: bash
      run: |
        npm run package -w xsmp-modeler -- --no-dependencies
        npm run package -w xsmp-tas-mdk
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
      with:
         # Additional arguments for the sonarcloud scanner
        args: >
          -Dsonar.projectKey=ydaveluy_xsmp-modeler
          -Dsonar.organization=ydaveluy
          -Dsonar.sources=packages/
          -Dsonar.exclusions=**/generated/**,**/out/**,**/lib/**,**/.types/**,**/test/**,**/test/expected/**,**/test/expected/generator-cpp/**
          -Dsonar.c.file.suffixes=-
          -Dsonar.cpp.file.suffixes=-
          -Dsonar.objc.file.suffixes=-
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.coverage.exclusions=**/*.test.*
          -Dsonar.links.scm=https://github.com/ydaveluy/xsmp-modeler
          -Dsonar.links.issue=https://github.com/ydaveluy/xsmp-modeler/issues
